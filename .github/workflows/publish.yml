name: Release and Publish

on:
  push:
    branches:
      - main
  # Manual recovery: publish the current main (package.json version) via OIDC
  # without cutting a new release. Used to ship a tagged release whose npm
  # publish previously failed.
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: node

  publish-npm:
    needs: release-please
    # Run after release-please creates a release, or on a manual dispatch.
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@v4
      # Node 24 bundles npm >= 11.5.1, the minimum that performs npm OIDC
      # trusted publishing. registry-url is intentionally omitted: setup-node
      # writes an .npmrc with a placeholder _authToken when it is set, and npm
      # then uses that bogus token instead of OIDC (a 404 on PUT). With no
      # token configured, npm 11.5.1+ performs the OIDC exchange against the
      # default registry (registry.npmjs.org).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install bun
        run: npm install -g bun
      - name: Install dependencies
        run: bun install
      - name: Publish to NPM (OIDC trusted publishing)
        run: npm publish
